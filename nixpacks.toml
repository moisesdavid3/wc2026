[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm && \"$(npm bin -g)/pnpm\" install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/predictor run build",
  "pnpm --filter @workspace/api-server run build",
  "cp -r artifacts/predictor/dist/public artifacts/api-server/dist/public"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
