kind = "web"
previewPath = "/"
title = "World Cup 2026 Predictor Pool"
version = "1.0.0"
id = "artifacts/predictor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24323

[services.development]
run = "pnpm --filter @workspace/predictor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/predictor", "run", "build" ]
publicDir = "artifacts/predictor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24323"
BASE_PATH = "/"
